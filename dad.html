<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:20px;
    color:#333;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:white;
    border-radius:16px;
    padding:24px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

h2{
    margin-top:0;
}

.status{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.message{
    font-size:20px;
    margin-bottom:10px;
}

.time{
    color:#666;
    font-size:14px;
}

.checkin-row{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.checkin-box{
    flex:1;
    min-width:220px;
    padding:20px;
    border-radius:12px;
    background:#f8f9fa;
}

.alert-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.alert-item:last-child{
    border-bottom:none;
}

.alert-type{
    font-weight:bold;
    font-size:18px;
}

.alert-message{
    margin-top:4px;
}

.alert-date{
    color:#777;
    font-size:13px;
    margin-top:4px;
}

.footer{
    text-align:center;
    color:#888;
    font-size:12px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

```
<h1>Hello Dad 👋</h1>

<div class="card">

    <h2>Latest Support Request</h2>

    <div id="status" class="status">
        Loading...
    </div>

    <div id="message" class="message">
    </div>

    <div id="latestTime" class="time">
    </div>

</div>

<div class="card">

    <h2>Latest Check-In</h2>

    <div class="checkin-row">

        <div class="checkin-box">
            <strong>Mood</strong>
            <div id="mood">Loading...</div>
        </div>

        <div class="checkin-box">
            <strong>Energy</strong>
            <div id="energy">Loading...</div>
        </div>

        <div class="checkin-box">
            <strong>Need Today</strong>
            <div id="needToday">Loading...</div>
        </div>

    </div>

</div>

<div class="card">

    <h2>Recent Alerts</h2>

    <div id="alerts">
        Loading...
    </div>

</div>

<div class="footer">
    Dad Dashboard v1
</div>
```

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzlTd0HcORu-R78042GmDC5buO-69X9XRB6NjPh-Qmtj_5fnA-fSKBAkXCnuufS5LU5/exec";

function getAlertLabel(type){

    if(type === "OKAY"){
        return "🟢 OKAY";
    }

    if(type === "SUPPORT"){
        return "🟡 SUPPORT";
    }

    if(type === "HELP"){
        return "🔴 HELP";
    }

    return type;
}

async function loadDashboard(){

    try{

        const response = await fetch(API_URL);

        const data = await response.json();

        const alerts = data.supportAlerts || [];
        const checkIns = data.checkIns || [];

        if(alerts.length > 1){

            const latest = alerts[alerts.length - 1];

            document.getElementById("status").innerHTML =
                getAlertLabel(latest[3]);

            document.getElementById("message").innerHTML =
                latest[4];

            document.getElementById("latestTime").innerHTML =
                "Received: " + latest[2];

            let html = "";

            for(let i = alerts.length - 1; i >= 1; i--){

                html += `
                    <div class="alert-item">
                        <div class="alert-type">
                            ${getAlertLabel(alerts[i][3])}
                        </div>

                        <div class="alert-message">
                            ${alerts[i][4]}
                        </div>

                        <div class="alert-date">
                            ${alerts[i][2]}
                        </div>
                    </div>
                `;
            }

            document.getElementById("alerts").innerHTML = html;
        }

        if(checkIns.length > 2){

            const latestCheckIn =
                checkIns[checkIns.length - 1];

            document.getElementById("mood").innerHTML =
                latestCheckIn[3];

            document.getElementById("energy").innerHTML =
                latestCheckIn[4];

            document.getElementById("needToday").innerHTML =
                latestCheckIn[5];
        }

    }catch(error){

        console.error(error);

        document.getElementById("status").innerHTML =
            "Unable to load dashboard";
    }
}

loadDashboard();

setInterval(loadDashboard,30000);

</script>

</body>
</html>
