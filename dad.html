<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dad Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #f0f4ff 0%, #fdf0ff 100%);
      min-height: 100vh;
      color: #333;
      padding: 24px 16px 48px;
    }
    .app-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .app-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: #3C3489;
    }
    .app-header p {
      font-size: 15px;
      color: #7c6fcd;
      margin-top: 4px;
    }
    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(83,74,183,0.08);
    }
    .card-title {
      font-size: 11px;
      font-weight: 800;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .badge-okay { background: linear-gradient(90deg, #d4f5d4, #b8edb8); color: #1a6b1a; }
    .badge-support { background: linear-gradient(90deg, #fff0cc, #ffe8a0); color: #7a5200; }
    .badge-help { background: linear-gradient(90deg, #ffd6d6, #ffb8b8); color: #8a1a1a; }
    .checkin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .checkin-box {
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
    }
    .checkin-box:nth-child(1) { background: #fdf0ff; }
    .checkin-box:nth-child(2) { background: #eef3ff; }
    .checkin-box:nth-child(3) { background: #f0faf0; }
    .checkin-box .label {
      font-size: 10px;
      font-weight: 800;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .checkin-box .value {
      font-size: 15px;
      font-weight: 800;
      color: #3C3489;
    }
    .alert-item {
      padding: 13px 14px;
      border-radius: 14px;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 15px;
    }
    .alert-item:last-child { margin-bottom: 0; }
    .alert-okay { background: #f0faf0; color: #1a6b1a; }
    .alert-support { background: #fffbf0; color: #7a5200; }
    .alert-help { background: #fff5f5; color: #8a1a1a; }
    .alert-date {
      font-size: 11px;
      font-weight: 400;
      color: #999;
      margin-top: 3px;
    }
    .time-tag {
      font-size: 12px;
      color: #bbb;
      margin-top: 8px;
    }
    .footer {
      text-align: center;
      color: #bbb;
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>Hi Dad 👋</h1>
    <p>Here's how Jesse is doing</p>
  </div>

  <div class="card">
    <div class="card-title">Latest Support Request</div>
    <div id="status"><span style="color:#ccc">No alerts yet</span></div>
    <div id="latestTime" class="time-tag"></div>
  </div>

  <div class="card">
    <div class="card-title">Latest Check-In</div>
    <div class="checkin-grid">
      <div class="checkin-box">
        <div class="label">Mood</div>
        <div class="value" id="mood">—</div>
      </div>
      <div class="checkin-box">
        <div class="label">Energy</div>
        <div class="value" id="energy">—</div>
      </div>
      <div class="checkin-box">
        <div class="label">Need</div>
        <div class="value" id="needToday">—</div>
      </div>
    </div>
    <div id="checkinTime" class="time-tag"></div>
  </div>

  <div class="card">
    <div class="card-title">Recent Alerts</div>
    <div id="alerts"><span style="color:#ccc">No alerts yet</span></div>
  </div>

  <div class="footer">Dad Dashboard 💜 · Refreshes every 30 seconds</div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzlTd0HcORu-R78042GmDC5buO-69X9XRB6NjPh-Qmtj_5fnA-fSKBAkXCnuufS5LU5/exec";

    function getAlertLabel(type) {
      if (type === "OKAY") return "🟢 I'm okay";
      if (type === "SUPPORT") return "🟡 I could use some support";
      if (type === "HELP") return "🔴 Dad, I need help today";
      return type;
    }

    function getBadgeClass(type) {
      if (type === "OKAY") return "badge-okay";
      if (type === "SUPPORT") return "badge-support";
      if (type === "HELP") return "badge-help";
      return "";
    }

    function getAlertItemClass(type) {
      if (type === "OKAY") return "alert-okay";
      if (type === "SUPPORT") return "alert-support";
      if (type === "HELP") return "alert-help";
      return "";
    }

    async function loadDashboard() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const alerts = data.supportAlerts || [];
        const checkIns = data.checkIns || [];

        if (alerts.length > 1) {
          const latest = alerts[alerts.length - 1];
          document.getElementById("status").innerHTML =
            `<span class="status-badge ${getBadgeClass(latest[3])}">${getAlertLabel(latest[3])}</span>`;
          document.getElementById("latestTime").innerHTML = "Received: " + latest[2];

          let html = "";
          const start = Math.max(1, alerts.length - 5);
          for (let i = alerts.length - 1; i >= start; i--) {
            html += `
              <div class="alert-item ${getAlertItemClass(alerts[i][3])}">
                ${getAlertLabel(alerts[i][3])}
                <div class="alert-date">${alerts[i][2]}</div>
              </div>
            `;
          }
          document.getElementById("alerts").innerHTML = html;
        }

        if (checkIns.length > 1) {
          const latest = checkIns[checkIns.length - 1];
          document.getElementById("mood").innerHTML = latest[3] || "—";
          document.getElementById("energy").innerHTML = latest[4] || "—";
          document.getElementById("needToday").innerHTML = latest[5] || "—";
          document.getElementById("checkinTime").innerHTML = "Updated: " + latest[2];
        }

      } catch(error) {
        document.getElementById("status").innerHTML = "Unable to load";
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
