<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Support App</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f8;
    color:#333;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    margin:8px 0;
    font-size:16px;
    cursor:pointer;
}

.green{
    background:#d4edda;
}

.yellow{
    background:#fff3cd;
}

.red{
    background:#f8d7da;
}

.input-group{
    margin-bottom:15px;
}

label{
    font-weight:bold;
}

select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
}

.checklist{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.footer{
    text-align:center;
    color:#888;
    font-size:12px;
    margin-top:25px;
}
</style>

</head>

<body>

<div class="container">

    <h1>Daily Support</h1>

    <div class="subtitle">
        How are you feeling today?
    </div>

    <div class="card">
        <div class="input-group">
            <label>Mood</label>
            <select>
                <option>😊 Good</option>
                <option>😐 Okay</option>
                <option>😔 Struggling</option>
            </select>
        </div>

        <div class="input-group">
            <label>Energy</label>
            <select>
                <option>⚡ High</option>
                <option>🔋 Medium</option>
                <option>🪫 Low</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h3>Support</h3>

        <button class="button green" onclick="sendAlert('OKAY')">
            🟢 I'm okay
        </button>

        <button class="button yellow" onclick="sendAlert('SUPPORT')">
            🟡 I could use some support
        </button>

        <button class="button red" onclick="sendAlert('HELP')">
            🔴 Dad, I need help today
        </button>
    </div>

    <div class="card">
        <h3>Today's Focus</h3>

        <div class="checklist">
            <label><input type="checkbox"> Shower</label>
            <label><input type="checkbox"> Eat breakfast</label>
            <label><input type="checkbox"> Attend session</label>
            <label><input type="checkbox"> Go for walk</label>
        </div>
    </div>

    <div class="card">
        <h3>Tomorrow's Plan</h3>

        <div class="checklist">
            <label><input type="checkbox"> Add tomorrow's goals</label>
            <label><input type="checkbox"> Plan appointments</label>
        </div>
    </div>

    <div class="footer">
        Daily Support App v1
    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzlTd0HcORu-R78042GmDC5buO-69X9XRB6NjPh-Qmtj_5fnA-fSKBAkXCnuufS5LU5/exec";

async function sendAlert(alertType){

    let message = "";

    switch(alertType){

        case "OKAY":
            message = "I'm okay today";
            break;

        case "SUPPORT":
            message = "I could use some support today";
            break;

        case "HELP":
            message = "Dad, I need help today";
            break;
    }

    console.log("Sending alert...");
    console.log("Type:", alertType);
    console.log("Message:", message);

    try {

        const response = await fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain"
            },
            body: JSON.stringify({
                userId: 2,
                alertType: alertType,
                message: message
            })
        });

        console.log("Fetch completed", response);

        alert("Support update sent ❤️");

    } catch(error) {

        console.error("FETCH ERROR:", error);

        alert("Unable to send update");
    }
}

</script>

</body>
</html>
