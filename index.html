<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Support App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      color: #333;
      padding: 20px 16px 40px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      color: #3C3489;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #534AB7;
      font-size: 15px;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 12px;
      font-weight: bold;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .select-btn {
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      background: #f8f9fa;
      color: #555;
      transition: all 0.15s;
    }
